<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>DePix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#38b2ac" />

  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Gerar QR Code PIX</h1>

    <div id="mensagem" class="mensagem"></div>

    <form id="form">
      <input id="valor" placeholder="R$ 0,00" inputmode="numeric" />
      <input id="endereco" placeholder="Endereço Liquid" />
      <button type="button" id="btnGerar">Gerar QR Code</button>
    </form>

    <div id="loading" class="hidden">Gerando…</div>

    <div id="resultado" class="hidden">
      <img id="qrImage" />
      <p id="qrId"></p>
      <button id="btnCopy">PIX copia e cola</button>
      <button id="btnReset">Novo pagamento</button>
    </div>
  </div>

  <!-- BOTÃO FLUTUANTE -->
  <button id="installFab" class="install-fab">
    ⬇️ Instale o app
  </button>

  <!-- MODAL (NUNCA ABRE SOZINHO) -->
  <div id="installModal" class="modal hidden">
    <div class="modal-content">
      <h2>Instalar no iPhone</h2>
      <ol>
        <li>Compartilhar (⬆️)</li>
        <li>Mais (⋯)</li>
        <li>Adicionar à Tela de Início</li>
      </ol>
      <button id="closeModal">Entendi</button>
    </div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>

  <script src="script.js"></script>
</body>
</html>
